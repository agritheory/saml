name: Tests

on:
  push:
    branches:
      - version-15
  pull_request:

concurrency:
  group: version-15-saml-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: write
  checks: write
  issues: write
  pull-requests: write

jobs:
  tests:
    name: Server
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: YES
          MYSQL_ROOT_PASSWORD: 'admin'
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Add to Hosts
        run: echo "127.0.0.1 test_site" | sudo tee -a /etc/hosts

      - name: Install Poetry
        uses: abatilo/actions-poetry@v4

      - name: Cache Poetry
        uses: actions/cache@v4
        with:
          path: ./.venv
          key: venv-${{ hashFiles('poetry.lock') }}

      - name: Install App Dependencies
        run: bash ${{ github.workspace }}/.github/helper/install_dependencies.sh

      - name: Install Bench Site and Apps
        env:
          MYSQL_HOST: 'localhost'
          MYSQL_PWD: 'admin'
        run: bash ${{ github.workspace }}/.github/helper/install.sh

      - name: Run Frappe Tests
        working-directory: /home/runner/frappe-bench
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app saml

      - name: Start Keycloak
        working-directory: /home/runner/frappe-bench/apps/saml/saml/tests
        run: |
          export BENCH_PORT=8000
          ./keycloak.sh -d

      - name: Wait for Keycloak
        run: |
          for attempt in $(seq 1 60); do
            if curl -sf http://localhost:8080/health/ready >/dev/null; then
              echo "Keycloak ready"
              exit 0
            fi
            sleep 2
          done
          echo "Keycloak did not become ready"
          exit 1

      - name: Run Pytest Tests
        working-directory: /home/runner/frappe-bench
        run: |
          source env/bin/activate
          pip install pytest-cov pytest-order requests
          cd apps/saml
          pytest saml/tests \
            --cov=saml \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --disable-warnings -s 2>&1 | tee pytest-coverage.txt
          python - <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          rate = float(ET.parse("coverage.xml").getroot().get("line-rate", "0"))
          print(f"Coverage line-rate: {rate:.1%}")
          if rate <= 0:
              sys.exit("Coverage report shows 0% — pytest did not measure executed code")
          PY
        env:
          TYPE: server

      - name: Pytest coverage comment
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-coverage-path: /home/runner/frappe-bench/apps/saml/pytest-coverage.txt
          pytest-xml-coverage-path: /home/runner/frappe-bench/apps/saml/coverage.xml
