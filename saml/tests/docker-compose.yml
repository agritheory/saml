services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
      - POSTGRES_DB=keycloak
    volumes:
      - 'postgres-data:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'keycloak']
      interval: 5s
      timeout: 5s
      retries: 5

  realm-processor:
    image: python:3.12-slim
    volumes:
      - ./realm-template.json:/app/realm-template.json
      - ./realm-export.json:/app/realm-export.json
      - ./process_realm.py:/app/process_realm.py
    command: python /app/process_realm.py
    environment:
      - BENCH_PORT=${BENCH_PORT:-8000}

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    depends_on:
      postgres:
        condition: service_healthy
      realm-processor:
        condition: service_completed_successfully
    ports:
      - '8080:8080'
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HEALTH_ENABLED=true
    command: ['start-dev', '--import-realm']
    volumes:
      - 'keycloak-data:/opt/keycloak/data'
      - './realm-export.json:/opt/keycloak/data/import/realm.json'

volumes:
  postgres-data:
    driver: local
  keycloak-data:
    driver: local
